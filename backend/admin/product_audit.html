<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ANOR - Dossier Audit Produit</title>

<style>

:root{
    --green:#008450;
    --gold:#c5a059;
    --red:#ce1126;
    --dark:#0f1113;
    --card:#1a1d21;
    --border:#2d3748;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--dark);
    color:white;
    font-family:Segoe UI,sans-serif;
}

.header{

    background:#15181b;

    padding:25px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    border-bottom:3px solid var(--gold);

}

.title h1{
    font-size:1.8rem;
}

.title span{
    color:#9ca3af;
}

.actions{
    display:flex;
    gap:10px;
}

.btn{

    border:none;

    padding:12px 18px;

    border-radius:10px;

    cursor:pointer;

    font-weight:bold;

    color:white;

}

.green{background:var(--green);}
.red{background:var(--red);}
.gold{background:var(--gold);color:black;}

.container{
    padding:25px;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;

}

.card{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:15px;

    padding:20px;

}

.card h3{
    margin-bottom:15px;
}

.label{

    color:#9ca3af;

    margin-bottom:5px;

    font-size:0.85rem;

}

.value{

    font-size:1rem;

    margin-bottom:15px;

}

.status{

    display:inline-block;

    padding:8px 14px;

    border-radius:30px;

    font-weight:bold;

}

.valid{
    background:#064e3b;
    color:#4ade80;
}

.suspect{
    background:#7f1d1d;
    color:#f87171;
}

.timeline{

    margin-top:15px;

}

.scan-item{

    background:#111827;

    padding:15px;

    border-radius:10px;

    margin-bottom:12px;

    border-left:4px solid var(--green);

}

.scan-item.suspicious{
    border-left:4px solid var(--red);
}

.scan-date{
    color:#9ca3af;
    font-size:0.8rem;
}

.loading{

    text-align:center;

    padding:80px;

    font-size:1.1rem;

}

@media(max-width:1000px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="header">

<div class="title">
<h1>DOSSIER COMPLET DU SCEAU</h1>
<span>Audit & Traçabilité ANOR</span>
</div>

<div class="actions">

<button
class="btn green"
onclick="history.back()">
← Retour
</button>

<button
class="btn gold"
onclick="window.print()">
🖨 Imprimer
</button>

</div>

</div>

<div class="container">

<div id="loading" class="loading">
Chargement du dossier...
</div>

<div id="content" style="display:none;">

<div class="grid">

<div class="card">

<h3>Informations Produit</h3>

<div class="label">Seal ID</div>
<div id="sealId" class="value"></div>

<div class="label">Produit</div>
<div id="productName" class="value"></div>

<div class="label">Entreprise</div>
<div id="producerName" class="value"></div>

<div class="label">Lot</div>
<div id="lotNumber" class="value"></div>

<div class="label">Quantité déclarée</div>
<div id="quantityDeclared" class="value"></div>

</div>

<div class="card">

<h3>Informations ANOR</h3>

<div class="label">Date génération</div>
<div id="generatedAt" class="value"></div>

<div class="label">Statut</div>
<div id="sealStatus" class="value"></div>

<div class="label">Nombre total scans</div>
<div id="scanCount" class="value"></div>

<div class="label">Dernier scan</div>
<div id="lastScan" class="value"></div>

<div class="label">
Certificat
</div>

<div
id="certificateBlock"
class="value">
-
</div>

</div>

</div>

<div class="card" style="margin-top:20px;">

<h3>Historique des Vérifications</h3>

<div id="timeline" class="timeline"></div>

</div>

</div>

</div>

<script>

// Routage adaptatif intelligent de l'API (Localhost vs Render)
const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
    ? "http://localhost:3000/api/admin"
    : "https://anor-back.onrender.com/api/admin";

const params=
new URLSearchParams(
window.location.search
);

const sealId=
params.get("seal");

if(!sealId){

alert("Seal ID manquant");

history.back();

}

// Fonction utilitaire pour lier le token d'authentification aux entêtes
function getAuthHeaders(headers = {}) {
    const token = localStorage.getItem("anor_token");
    if (!token) {
        console.warn("Requête émise sans session valide.");
        return headers;
    }
    return {
        ...headers,
        "Authorization": `Bearer ${token}`
    };
}

loadAudit();

async function loadAudit(){

try{

const response=
await fetch(
`${API}/product/${sealId}`, {
    headers: getAuthHeaders()
}
);

const data=
await response.json();

populateAudit(data);

}
catch(err){

console.error(err);

alert(
"Impossible de charger le dossier."
);

}

}

function populateAudit(data){

document.getElementById(
"loading"
).style.display="none";

document.getElementById(
"content"
).style.display="block";

const product=
data.product;

const scans=
data.scans || [];

document.getElementById(
"sealId"
).innerText=
product.seal_id;

document.getElementById(
"productName"
).innerText=
product.products?.product_name || "-";

document.getElementById(
"producerName"
).innerText=
product.products?.producer_name || "-";

document.getElementById(
"lotNumber"
).innerText=
product.products?.lot_number || "-";

document.getElementById(
"quantityDeclared"
).innerText=
product.products?.quantity_declared || "-";

document.getElementById(
"generatedAt"
).innerText=
new Date(
product.generated_at
).toLocaleString();

document.getElementById(
"scanCount"
).innerText=
scans.length;

document.getElementById(
"lastScan"
).innerText=
scans.length
?
new Date(
scans[0].scan_time
).toLocaleString()
:
"Aucun";

document.getElementById(
"sealStatus"
).innerHTML=
product.suspicious

?

`<span class="status suspect">
SUSPECT
</span>`

:

`<span class="status valid">
VALIDE
</span>`;

// Injection JS du lien de consultation et téléchargement du Certificat
const certUrl =
product.products
?.conformity_certificate_url;

if(certUrl){

document.getElementById(
"certificateBlock"
).innerHTML = `

<a
href="${certUrl}"
target="_blank"
rel="noopener noreferrer"
style="color:var(--gold); text-decoration:none; font-weight:bold;">
📄 Consulter
</a>

&nbsp;&nbsp;&nbsp;&nbsp;

<a
href="${certUrl}"
download
style="color:var(--green); text-decoration:none; font-weight:bold;">
⬇ Télécharger
</a>

`;

}

buildTimeline(scans);

}

function buildTimeline(scans){

const timeline=
document.getElementById(
"timeline"
);

if(!scans.length){

timeline.innerHTML=
`
<div class="scan-item">
Aucune vérification enregistrée.
</div>
`;

return;

}

timeline.innerHTML=
scans.map(scan=>`

<div class="scan-item">

<div>
<b>${scan.city || "-"}</b>
,
${scan.country || "-"}
</div>

<div class="scan-date">
${new Date(
scan.scan_time
).toLocaleString()}
</div>

<br>

<div>
Latitude :
${scan.latitude || "-"}
</div>

<div>
Longitude :
${scan.longitude || "-"}
</div>

</div>

`).join("");

}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ANOR - Centre National des Alertes</title>

<style>

:root{
    --green:#008450;
    --gold:#c5a059;
    --dark:#0f1113;
    --card:#1a1d21;
    --border:#2d3748;
    --red:#ce1126;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--dark);
    color:white;
    font-family:Segoe UI,sans-serif;
}

.header{

    background:#15181b;

    padding:25px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    border-bottom:3px solid var(--gold);

}

.title h1{
    font-size:1.8rem;
}

.title span{
    color:#9ca3af;
}

.top-actions{

    display:flex;
    gap:10px;

}

.btn{

    border:none;

    padding:12px 18px;

    border-radius:10px;

    cursor:pointer;

    font-weight:bold;

    color:white;

}

.btn-green{
    background:var(--green);
}

.btn-red{
    background:var(--red);
}

.btn-gold{
    background:var(--gold);
    color:black;
}

.dashboard{

    padding:25px;

}

.stats{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:20px;

    margin-bottom:25px;

}

.card{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:15px;

    padding:20px;

}

.card h2{
    font-size:2rem;
}

.card p{
    color:#9ca3af;
}

.alerts-container{

    background:var(--card);

    border-radius:15px;

    border:1px solid var(--border);

    overflow:hidden;

}

.table-header{

    padding:20px;

    border-bottom:1px solid var(--border);

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.search{

    width:350px;

    padding:10px;

    border-radius:10px;

    border:none;

    background:#0f1113;

    color:white;

}

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:#15181b;

    text-align:left;

    padding:15px;

}

td{

    padding:15px;

    border-bottom:1px solid #23272f;

}

.badge{

    padding:5px 10px;

    border-radius:20px;

    font-size:0.75rem;

    font-weight:bold;

}

.badge-danger{

    background:#7f1d1d;

    color:#f87171;

}

.action-btn{

    border:none;

    padding:8px 12px;

    border-radius:8px;

    cursor:pointer;

    margin-right:5px;

}

.audit-btn{
    background:#2563eb;
    color:white;
}

.resolve-btn{
    background:#16a34a;
    color:white;
}

@media(max-width:1200px){

.stats{
grid-template-columns:1fr 1fr;
}

table{
display:block;
overflow:auto;
}

}

</style>
</head>

<body>

<div class="header">

<div class="title">
<h1>🚨 CENTRE NATIONAL DES ALERTES</h1>
<span>ANOR Surveillance & Répression des Anomalies</span>
</div>

<div class="top-actions">

<button
class="btn btn-green"
onclick="location.href='dashboard.html'">
🏠 Dashboard
</button>

<button
class="btn btn-gold"
onclick="location.href='map_surveillance.html'">
🗺 Cartographie
</button>

<button
class="btn btn-red"
onclick="loadAlerts()">
🔄 Actualiser
</button>

</div>

</div>

<div class="dashboard">

<div class="stats">

<div class="card">
<h2 id="totalAlerts">0</h2>
<p>Alertes actives</p>
</div>

<div class="card">
<h2 id="todayAlerts">0</h2>
<p>Aujourd'hui</p>
</div>

<div class="card">
<h2 id="productsAffected">0</h2>
<p>Produits concernés</p>
</div>

<div class="card">
<h2 id="producersAffected">0</h2>
<p>Producteurs concernés</p>
</div>

</div>

<div class="alerts-container">

<div class="table-header">

<h3>Liste des Alertes</h3>

<input
type="text"
id="search"
class="search"
placeholder="Recherche..."
onkeyup="filterAlerts()">

</div>

<table>

<thead>

<tr>
<th>Sceau</th>
<th>Produit</th>
<th>Producteur</th>
<th>Date</th>
<th>Statut</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="alertsBody">

<tr>
<td colspan="6">
Chargement...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script>

// Routage adaptatif intelligent (Localhost vs Render)
const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
    ? "http://localhost:3000/api/admin"
    : "https://anor-back.onrender.com/api/admin";

// Fonction utilitaire pour injecter le token d'authentification
function getAuthHeaders(headers = {}) {
    const token = localStorage.getItem("anor_token");
    if (!token) {
        console.warn("Requête de sécurité émise sans session valide.");
        return headers;
    }
    return {
        ...headers,
        "Authorization": `Bearer ${token}`
    };
}

let alerts=[];

async function loadAlerts(){

try{

const res=
await fetch(`${API}/alerts`, {
    headers: getAuthHeaders()
});

alerts=
await res.json();

// AJOUT DU LOG DE DEBOGAGE
console.log("ALERTS =", alerts);

renderAlerts();

}
catch(err){

console.error(err);

}

}

function renderAlerts(){

const tbody=
document.getElementById("alertsBody");

tbody.innerHTML="";

const products=
new Set();

const producers=
new Set();

let todayCount=0;

alerts.forEach(alert=>{

products.add(alert.seal_id);
producers.add(alert.type);

const today=
new Date().toDateString();

const generated=
new Date(
alert.generated_at
).toDateString();

if(today===generated)
todayCount++;

tbody.innerHTML+=`

<tr>

<td>${alert.seal_id}</td>

<td>${alert.type}</td>

<td>${alert.level}</td>

<td>-</td>

<td>

<span class="badge badge-danger">

SUSPECT

</span>

</td>

<td>

<button
class="action-btn audit-btn"
onclick="openAuditModal('${alert.seal_id}')">

Dossier

</button>

<button
class="action-btn resolve-btn"
onclick="resolveAlert('${alert.seal_id}')">

Résoudre

</button>

</td>

</tr>

`;

});

document.getElementById(
"totalAlerts"
).innerText=
alerts.length;

document.getElementById(
"todayAlerts"
).innerText=
todayCount;

document.getElementById(
"productsAffected"
).innerText=
products.size;

document.getElementById(
"producersAffected"
).innerText=
producers.size;

}

function filterAlerts(){

const term=
document
.getElementById("search")
.value
.toLowerCase();

const rows=
document.querySelectorAll(
"#alertsBody tr"
);

rows.forEach(row=>{

row.style.display=
row.innerText
.toLowerCase()
.includes(term)

?

""

:

"none";

});

}

function openAuditModal(sealId){

    window.location.href =
    `./product_audit.html?seal=${sealId}`;

}

async function resolveAlert(sealId){

if(
!confirm(
"Retirer cette alerte ?"
)
)return;

try{

await fetch(
`${API}/seal/${sealId}/suspicious`,
{
method:"PATCH",
headers: getAuthHeaders({
"Content-Type":"application/json"
}),
body:JSON.stringify({
suspicious:false
})
}
);

loadAlerts();

}
catch(err){

console.error(err);

}

}

loadAlerts();

setInterval(
loadAlerts,
30000
);

</script>
</body>
</html>

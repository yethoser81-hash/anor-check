<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANOR Verification - Connexion</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f3f5f7;
}

.login-card{

width:420px;
background:white;
padding:40px;
border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

}

h1{
color:#008450;
text-align:center;
margin-bottom:30px;
}

input{

width:100%;
padding:14px;
margin-bottom:15px;

border:1px solid #ddd;
border-radius:10px;

}

button{

width:100%;
padding:14px;

border:none;
border-radius:10px;

background:#008450;
color:white;

font-weight:bold;
cursor:pointer;

}

button:hover{
opacity:.9;
}

</style>

</head>
<body>

<div class="login-card">

<h1>ANOR Verification</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Mot de passe">

<button onclick="login()">
Connexion
</button>

</div>

<script>

function login(){

window.location.href =
"dashboard.html";

}

</script>

</body>
</html>
